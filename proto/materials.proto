syntax = "proto3";

package materials;

option go_package = "proto/materials";
option swift_prefix = "Materials_";

import "common.proto";

message UploadFileRequest {
  bytes file_content = 1;
  string filename = 2;
  optional uint32 parent_id = 3;
  optional string name = 4;
  bool hidden = 5;
}

message UploadFileResponse {
  string material_id = 1;
  string name = 2;
  int64 size = 3;
  string mime_type = 4;
  optional string download_url = 5;
}

message DownloadFileRequest {
  string material_id = 1;
}

message DownloadFileResponse {
  bytes content = 1;
  string filename = 2;
  string mime_type = 3;
  int64 size = 4;
  optional string content_base64 = 5; // Контент файла в формате base64 для удобства передачи через gRPC
}

message ListFolderRequest {
  optional uint32 parent_id = 1;
}

message Node {
  uint32 id = 1;
  uint32 user_id = 2;
  optional uint32 parent_id = 3;
  string type = 4;
  string name = 5;
  optional FileInfo file = 6;
  optional LinkInfo link = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  optional string material_id = 10; // UUID for download/API
}

message FileInfo {
  string object_key = 1;
  string mime_type = 2;
  int64 size = 3;
}

message LinkInfo {
  string url = 1;
  optional string title = 2;
  optional string description = 3;
}

message ListFolderResponse {
  repeated Node nodes = 1;
}

message CreateFolderRequest {
  string name = 1;
  optional uint32 parent_id = 2;
}

message CreateFolderResponse {
  Node node = 1;
}

message CreateLinkRequest {
  string name = 1;
  string url = 2;
  optional string title = 3;
  optional string description = 4;
  optional uint32 parent_id = 5;
}

message CreateLinkResponse {
  Node node = 1;
}

message RenameNodeRequest {
  uint32 node_id = 1;
  string new_name = 2;
}

message RenameNodeResponse {
  bool success = 1;
}

message DeleteNodeRequest {
  uint32 node_id = 1;
}

message DeleteNodeResponse {
  bool success = 1;
}

message DeleteUserDataRequest {
  uint32 user_id = 1;
}

message DeleteUserDataResponse {
  bool ok = 1;
}

service MaterialsService {
  rpc UploadFile(UploadFileRequest) returns (UploadFileResponse);
  rpc DownloadFile(DownloadFileRequest) returns (DownloadFileResponse);
  rpc ListFolder(ListFolderRequest) returns (ListFolderResponse);
  rpc CreateFolder(CreateFolderRequest) returns (CreateFolderResponse);
  rpc CreateLink(CreateLinkRequest) returns (CreateLinkResponse);
  rpc RenameNode(RenameNodeRequest) returns (RenameNodeResponse);
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse);
  rpc DeleteUserData(DeleteUserDataRequest) returns (DeleteUserDataResponse);
}
