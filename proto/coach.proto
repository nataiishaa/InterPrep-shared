syntax = "proto3";

package coach;

option go_package = "proto/coach";

import "common.proto";
import "user.proto";

message AskRequest {
  optional string conversation_id = 1;
  string question = 2;
  optional user.ResumeProfile resume_profile = 3;
  repeated ContextChunk context_chunks = 4;
}

message ContextChunk {
  string source = 1;
  string title = 2;
  string content = 3;
}

message AskResponse {
  string conversation_id = 1;
  string answer = 2;
}

// TODO: delete — replaced by UploadAndParseResume
message ParseResumeRequest {
  string material_id = 1;
}

message UploadAndParseResumeRequest {
  bytes file_content = 1;
  string filename = 2;
}

message UploadAndParseResumeResponse {
  string session_id = 1;
  ResumeProfileDraft draft = 2;
  repeated Question questions = 3;
  string status = 4;
}

message ResumeProfileDraft {
  repeated string target_roles = 1;
  repeated ProfessionalRoleCandidate professional_role_candidates = 2;
  optional string experience_level = 3;
  repeated Area areas = 4;
  optional double salary_min = 5;
  optional string currency = 6;
  repeated string work_format = 7;
  repeated string skills_top = 8;
  optional string notes = 9;
  map<string, double> confidence = 10;
}

message ProfessionalRoleCandidate {
  string id = 1;
  string name = 2;
  double confidence = 3;
}

message Area {
  string id = 1;
  string name = 2;
  double confidence = 3;
}

message Question {
  string id = 1;
  string text = 2;
  string type = 3;
  repeated string options = 4;
}

message ParseResumeResponse {
  string session_id = 1; // UUID, generated when session is created
  ResumeProfileDraft draft = 2;
  repeated Question questions = 3;
  string status = 4;
}

message QuestionAnswer {
  string question_id = 1;
  string value = 2;
}

message AnswerResumeRequest {
  string session_id = 1;
  repeated QuestionAnswer answers = 2;
}

message AnswerResumeResponse {
  string session_id = 1;
  ResumeProfileDraft draft = 2;
  repeated Question questions = 3;
  string status = 4;
}

message GetResumeSessionRequest {
  string session_id = 1; // UUID of the resume parse session
}

message GetResumeSessionResponse {
  string session_id = 1;
  ResumeProfileDraft draft = 2;
  repeated Question questions = 3;
  string status = 4;
}

// Подготовка к вакансии: vacancy_id -> рекомендации по подготовке
message PrepareForVacancyRequest {
  string vacancy_id = 1;
}

message PrepareForVacancyResponse {
  string recommendations = 1;
}

// Анализ резюме: оценка + рекомендации по улучшению
message ReviewResumeRequest {}

message ReviewResumeResponse {
  double score = 1;           // 0-10
  string recommendations = 2;
}

message DeleteUserDataRequest {
  uint32 user_id = 1;
}

message DeleteUserDataResponse {
  bool ok = 1;
}

// Пустой conversation_id — удалить всю историю чата пользователя; иначе — один диалог.
message ClearChatHistoryRequest {
  optional string conversation_id = 1;
}

message ClearChatHistoryResponse {
  bool ok = 1;
  int32 deleted_conversations = 2;
}

enum ChatMessageOwner {
  CHAT_MESSAGE_OWNER_UNSPECIFIED = 0;
  CHAT_MESSAGE_OWNER_USER = 1;
  CHAT_MESSAGE_OWNER_ASSISTANT = 2;
}

message AddChatMessageRequest {
  optional string conversation_id = 1;
  string content = 2;
  ChatMessageOwner owner = 3;
}

message AddChatMessageResponse {
  string conversation_id = 1;
}

// Единая лента: вопросы Ask, ответы коуча, анализ резюме, подготовка к вакансии.
enum CoachHistoryEntryKind {
  COACH_HISTORY_ENTRY_KIND_UNSPECIFIED = 0;
  COACH_HISTORY_ENTRY_KIND_ASK_USER = 1;
  COACH_HISTORY_ENTRY_KIND_ASK_ASSISTANT = 2;
  COACH_HISTORY_ENTRY_KIND_REVIEW_RESUME = 3;
  COACH_HISTORY_ENTRY_KIND_PREPARE_VACANCY = 4;
}

message CoachHistoryEntry {
  CoachHistoryEntryKind kind = 1;
  string conversation_id = 2;
  string content = 3;
  optional double resume_score = 4;
  optional string vacancy_id = 5;
  string created_at = 6; // RFC3339
}

message GetCoachChatHistoryRequest {
  int32 page_size = 1;
  int32 page_offset = 2;
}

message GetCoachChatHistoryResponse {
  repeated CoachHistoryEntry entries = 1;
  int32 total_count = 2;
}

service CoachService {
  rpc Ask(AskRequest) returns (AskResponse);
  rpc ParseResume(ParseResumeRequest) returns (ParseResumeResponse); // TODO: delete
  rpc UploadAndParseResume(UploadAndParseResumeRequest) returns (UploadAndParseResumeResponse);
  rpc AnswerResume(AnswerResumeRequest) returns (AnswerResumeResponse);
  rpc GetResumeSession(GetResumeSessionRequest) returns (GetResumeSessionResponse);
  rpc PrepareForVacancy(PrepareForVacancyRequest) returns (PrepareForVacancyResponse);
  rpc ReviewResume(ReviewResumeRequest) returns (ReviewResumeResponse);
  rpc ClearChatHistory(ClearChatHistoryRequest) returns (ClearChatHistoryResponse);
  rpc AddChatMessage(AddChatMessageRequest) returns (AddChatMessageResponse);
  rpc GetCoachChatHistory(GetCoachChatHistoryRequest) returns (GetCoachChatHistoryResponse);
  rpc DeleteUserData(DeleteUserDataRequest) returns (DeleteUserDataResponse);
}
